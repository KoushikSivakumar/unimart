{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="fw-bold mb-3">Login</h2>
                <p class="text-muted">Enter the marketplace grid.</p>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input 
                            type="text" 
                            name="username" 
                            class="form-control" 
                            placeholder="Your username"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input 
                            type="password" 
                            name="password" 
                            class="form-control" 
                            placeholder="Your password"
                            required
                        >
                    </div>

                    {% if form.errors %}
                        <div class="alert alert-danger">
                            Invalid username or password.
                        </div>
                    {% endif %}

                    <button type="submit" class="btn btn-dark w-100">
                        Login
                    </button>
                </form>

                <p class="mt-3 mb-0">
                    New here?
                    <a href="{% url 'accounts:signup' %}">Create account</a>
                </p>
            </div>
        </div>

    </div>
</div>

{% endblock %}
