<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>unimart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand fw-bold" href="{% url 'marketplace:product_list' %}">
            unimart
        </a>

        <div class="ms-auto">
            {% if user.is_authenticated %}
                <span class="text-white me-3">
                    Hi, {{ user.username }} · {{ user.get_role_display }}
                </span>

                <a href="{% url 'marketplace:seller_dashboard' %}" class="btn btn-warning btn-sm me-2">
                    Seller Dashboard
                </a>

                <form action="{% url 'accounts:logout' %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        Logout
                    </button>
                </form>
            {% else %}
                <a href="{% url 'accounts:login' %}" class="btn btn-outline-light btn-sm me-2">
                    Login
                </a>

                <a href="{% url 'accounts:signup' %}" class="btn btn-warning btn-sm">
                    Signup
                </a>
            {% endif %}
        </div>

    </div>
</nav>

<main class="container py-4">
    {% block content %}
    {% endblock %}
</main>

<!-- Bootstrap JS -->
<script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
